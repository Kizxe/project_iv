<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — StudentDB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0f; --bg2: #141417; --bg3: #1c1c21;
      --border: #2a2a31; --accent: #7c6cfc; --accent2: #a594fd;
      --text: #e8e8f0; --text2: #8888a0; --text3: #55556a;
      --success: #3ecf8e; --danger: #f16060;
    }
    body {
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      width: 100%;
      max-width: 400px;
      padding: 24px;
    }
    .brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .brand-icon { font-size: 28px; color: var(--accent2); }
    .brand-name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 24px;
      margin-top: 8px;
    }
    .tabs {
      display: flex;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px 10px 0 0;
      overflow: hidden;
    }
    .tab {
      flex: 1;
      padding: 12px;
      border: none;
      background: transparent;
      color: var(--text2);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tab.active { background: var(--bg3); color: var(--accent2); }
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 10px 10px;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .form-group { display: flex; flex-direction: column; gap: 7px; }
    .form-group label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text2);
    }
    .form-group input {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      padding: 11px 14px;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-group input:focus { border-color: var(--accent); }
    .form-group input::placeholder { color: var(--text3); }
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      margin-top: 4px;
    }
    .btn:hover { background: var(--accent2); transform: translateY(-1px); }
    .msg {
      font-size: 12px;
      padding: 10px 14px;
      border-radius: 6px;
      display: none;
    }
    .msg.success { display: block; background: rgba(62,207,142,0.1); border: 1px solid rgba(62,207,142,0.3); color: var(--success); }
    .msg.error { display: block; background: rgba(241,96,96,0.1); border: 1px solid rgba(241,96,96,0.3); color: var(--danger); }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">
      <div class="brand-icon">◈</div>
      <div class="brand-name">StudentDB</div>
    </div>
